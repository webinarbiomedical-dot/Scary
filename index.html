<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXA AI Assistant</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f19;
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #0f172a;
    padding: 20px;
    box-sizing: border-box;
}

.sidebar h2 {
    color: #38bdf8;
    margin-bottom: 20px;
}

.sidebar p {
    font-size: 14px;
    opacity: 0.7;
}

/* Chat area */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    background: #111827;
    font-size: 18px;
    border-bottom: 1px solid #1f2937;
}

.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    margin: 10px 0;
    padding: 12px 15px;
    border-radius: 12px;
    max-width: 70%;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #2563eb;
    margin-left: auto;
    text-align: right;
}

.ai {
    background: #1f2937;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Input area */
.input-area {
    display: flex;
    padding: 15px;
    background: #111827;
    border-top: 1px solid #1f2937;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1f2937;
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>NEXA AI</h2>
    <p>Advanced assistant prototype UI</p>
    <p>Status: <span style="color:#22c55e;">Online</span></p>
    <p>Mode: Chat Simulation</p>
</div>

<div class="chat-container">

    <div class="header">
        💬 Chat with NEXA Assistant
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai">
            Hello! I am NEXA 🤖 How can I assist you today?
        </div>
    </div>

    <div class="input-area">
        <input id="input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
        addMessage(getAIResponse(text), "ai");
    }, 600);
}

function addMessage(text, type) {
    const chatBox = document.getElementById("chatBox");

    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerText = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function getAIResponse(input) {
    input = input.toLowerCase();

    if (input.includes("hello") || input.includes("hi")) {
        return "Hello there 👋 How can I help you today?";
    }

    if (input.includes("name")) {
        return "I am NEXA, your virtual AI assistant.";
    }

    if (input.includes("how are you")) {
        return "I am running perfectly fine ⚡ Thanks for asking!";
    }

    if (input.includes("love")) {
        return "I am an AI... but I appreciate the emotion ❤️";
    }

    if (input.includes("create")) {
        return "I can help you design websites, ideas, and prototypes 🚀";
    }

    return "Interesting 🤔 tell me more...";
}

</script>

</body>
</html>
